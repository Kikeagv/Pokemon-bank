<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Acciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body data-page="actions">
  <header class="pb-header">
    <img src="images/logo.png" alt="Pokémon Bank" class="pb-header-logo">
    <div class="pb-header-user">
      <div class="pb-header-user-name" data-user-name>Ash Ketchum</div>
      <div class="pb-header-user-account" data-user-account>0987654321</div>
    </div>
    <img src="images/trainer-avatar.png" alt="Foto de perfil de Ash Ketchum" class="pb-header-avatar">
    <a href="index.html" class="pb-btn-exit" data-logout>Salir</a>
  </header>

  <main class="container py-4">
    <div class="pb-balance-card" aria-live="polite">
      <div class="pb-balance-label">Saldo disponible</div>
      <div class="pb-balance-amount" data-user-balance>$500.00</div>
    </div>

    <div class="pb-actions-grid">
      <button class="pb-action-btn" data-bs-toggle="modal" data-bs-target="#modalDepositar">
        <i class="bi bi-arrow-down-circle" aria-hidden="true"></i>
        <span>Depositar</span>
      </button>

      <button class="pb-action-btn" data-bs-toggle="modal" data-bs-target="#modalRetirar">
        <i class="bi bi-arrow-up-circle" aria-hidden="true"></i>
        <span>Retirar</span>
      </button>

      <button class="pb-action-btn" data-bs-toggle="modal" data-bs-target="#modalConsultar">
        <i class="bi bi-wallet2" aria-hidden="true"></i>
        <span>Consultar saldo</span>
      </button>

      <button class="pb-action-btn" data-bs-toggle="modal" data-bs-target="#modalPagar">
        <i class="bi bi-receipt" aria-hidden="true"></i>
        <span>Pagar servicios</span>
      </button>

      <a href="historial.html" class="pb-action-btn">
        <i class="bi bi-clock-history" aria-hidden="true"></i>
        <span>Historial</span>
      </a>

      <a href="grafico.html" class="pb-action-btn">
        <i class="bi bi-bar-chart" aria-hidden="true"></i>
        <span>Ver gráfico</span>
      </a>
    </div>
  </main>

  <div class="modal fade" id="modalDepositar" tabindex="-1" aria-labelledby="modalDepositarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header pb-modal-header">
          <h5 class="modal-title" id="modalDepositarLabel">Depositar</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="montoDeposito" class="form-label">Monto a depositar</label>
            <input type="number" class="form-control" id="montoDeposito" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal">
            <div class="invalid-feedback"></div>
          </div>
          <button type="button" class="pb-btn-confirm" data-action="deposit">Confirmar depósito</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalRetirar" tabindex="-1" aria-labelledby="modalRetirarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header pb-modal-header">
          <h5 class="modal-title" id="modalRetirarLabel">Retirar</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Montos rápidos</label>
            <div class="pb-quick-amounts" role="group" aria-label="Montos rápidos">
              <button type="button" class="pb-quick-amount" aria-label="$20" data-quick-amount="20">$20</button>
              <button type="button" class="pb-quick-amount" aria-label="$50" data-quick-amount="50">$50</button>
              <button type="button" class="pb-quick-amount" aria-label="$100" data-quick-amount="100">$100</button>
              <button type="button" class="pb-quick-amount" aria-label="$200" data-quick-amount="200">$200</button>
            </div>
          </div>
          <div class="mb-3">
            <label for="montoRetiro" class="form-label">Otro monto</label>
            <input type="number" class="form-control" id="montoRetiro" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal">
            <div class="invalid-feedback"></div>
          </div>
          <button type="button" class="pb-btn-confirm" data-action="withdraw">Confirmar retiro</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalConsultar" tabindex="-1" aria-labelledby="modalConsultarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header pb-modal-header">
          <h5 class="modal-title" id="modalConsultarLabel">Consultar Saldo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body text-center">
          <p class="mb-2">Su saldo actual es:</p>
          <h2 class="pb-balance-amount" data-user-balance>$500.00</h2>
          <button type="button" class="pb-btn-confirm mt-3" data-action="consult">Registrar consulta</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalPagar" tabindex="-1" aria-labelledby="modalPagarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header pb-modal-header">
          <h5 class="modal-title" id="modalPagarLabel">Pagar Servicios</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="servicio" class="form-label">Seleccione servicio</label>
            <select class="form-select" id="servicio">
              <option value="">-- Seleccionar --</option>
              <option value="energia">Energía eléctrica</option>
              <option value="internet">Internet</option>
              <option value="telefonia">Telefonía</option>
              <option value="agua">Agua potable</option>
            </select>
            <div class="invalid-feedback"></div>
          </div>
          <div class="mb-3">
            <label for="montoPago" class="form-label">Monto a pagar</label>
            <input type="number" class="form-control" id="montoPago" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal">
            <div class="invalid-feedback"></div>
          </div>
          <button type="button" class="pb-btn-confirm" data-action="payment">Confirmar pago</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
