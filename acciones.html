<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Acciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body data-page="actions">
  <header class="pb-header">
    <img src="images/logo.png" alt="Pokémon Bank" class="pb-header-logo">
    <div class="pb-header-user">
      <div class="pb-header-user-name" data-user-name>Ash Ketchum</div>
      <div class="pb-header-user-account" data-user-account>0987654321</div>
    </div>
    <img src="images/trainer-avatar.png" alt="Foto de perfil de Ash Ketchum" class="pb-header-avatar">
    <a href="index.html" class="pb-btn-exit" data-logout>Salir</a>
  </header>

  <main class="pb-atm-stage">
    <section class="pb-atm-view is-active" data-atm-view="menu" aria-labelledby="menuTitle">
      <div class="pb-balance-card" aria-live="polite">
        <div class="pb-balance-label">Saldo disponible</div>
        <div class="pb-balance-amount" data-user-balance>$500.00</div>
      </div>

      <h1 class="pb-screen-title" id="menuTitle">Seleccione una operación</h1>

      <div class="pb-actions-grid">
        <button class="pb-action-btn" type="button" data-go-view="deposit">
          <i class="bi bi-arrow-down-circle" aria-hidden="true"></i>
          <span>Depositar</span>
        </button>

        <button class="pb-action-btn" type="button" data-go-view="withdraw">
          <i class="bi bi-arrow-up-circle" aria-hidden="true"></i>
          <span>Retirar</span>
        </button>

        <button class="pb-action-btn" type="button" data-go-view="consult">
          <i class="bi bi-wallet2" aria-hidden="true"></i>
          <span>Consultar saldo</span>
        </button>

        <button class="pb-action-btn" type="button" data-go-view="payment">
          <i class="bi bi-receipt" aria-hidden="true"></i>
          <span>Pagar servicios</span>
        </button>

        <a href="historial.html" class="pb-action-btn">
          <i class="bi bi-clock-history" aria-hidden="true"></i>
          <span>Historial</span>
        </a>

        <a href="grafico.html" class="pb-action-btn">
          <i class="bi bi-bar-chart" aria-hidden="true"></i>
          <span>Ver gráfico</span>
        </a>
      </div>
    </section>

    <section class="pb-atm-view" data-atm-view="deposit" aria-labelledby="depositTitle" hidden>
      <div class="pb-operation-header">
        <button type="button" class="pb-atm-control pb-atm-control-muted" data-go-view="menu">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Atrás
        </button>
        <h1 class="pb-screen-title" id="depositTitle">Depósito</h1>
      </div>

      <div class="pb-transaction-layout">
        <div class="pb-amount-panel">
          <label class="pb-amount-label" for="montoDeposito">Monto a depositar</label>
          <input class="pb-amount-display" id="montoDeposito" type="text" inputmode="none" readonly value="0.00" data-amount-input data-error-target="depositError">
          <div class="invalid-feedback pb-atm-error" id="depositError"></div>
          <button type="button" class="pb-btn-confirm pb-atm-confirm" data-action="deposit">Confirmar depósito</button>
        </div>

        <div class="pb-amount-keypad" data-keypad-for="montoDeposito" aria-label="Teclado numerico para deposito"></div>
      </div>
    </section>

    <section class="pb-atm-view" data-atm-view="withdraw" aria-labelledby="withdrawTitle" hidden>
      <div class="pb-operation-header">
        <button type="button" class="pb-atm-control pb-atm-control-muted" data-go-view="menu">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Atrás
        </button>
        <h1 class="pb-screen-title" id="withdrawTitle">Retiro</h1>
      </div>

      <div class="pb-quick-amounts" role="group" aria-label="Montos rápidos de retiro">
        <button type="button" class="pb-quick-amount" data-set-amount="20" data-target-input="montoRetiro">$20</button>
        <button type="button" class="pb-quick-amount" data-set-amount="50" data-target-input="montoRetiro">$50</button>
        <button type="button" class="pb-quick-amount" data-set-amount="100" data-target-input="montoRetiro">$100</button>
        <button type="button" class="pb-quick-amount" data-set-amount="200" data-target-input="montoRetiro">$200</button>
      </div>

      <div class="pb-transaction-layout">
        <div class="pb-amount-panel">
          <label class="pb-amount-label" for="montoRetiro">Monto a retirar</label>
          <input class="pb-amount-display" id="montoRetiro" type="text" inputmode="none" readonly value="0.00" data-amount-input data-error-target="withdrawError">
          <div class="invalid-feedback pb-atm-error" id="withdrawError"></div>
          <button type="button" class="pb-btn-confirm pb-atm-confirm" data-action="withdraw">Confirmar retiro</button>
        </div>

        <div class="pb-amount-keypad" data-keypad-for="montoRetiro" aria-label="Teclado numerico para retiro"></div>
      </div>
    </section>

    <section class="pb-atm-view" data-atm-view="consult" aria-labelledby="consultTitle" hidden>
      <div class="pb-operation-header">
        <button type="button" class="pb-atm-control pb-atm-control-muted" data-go-view="menu">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Atrás
        </button>
        <h1 class="pb-screen-title" id="consultTitle">Consulta de saldo</h1>
      </div>

      <div class="pb-consult-screen">
        <div class="pb-balance-label">Saldo disponible</div>
        <div class="pb-balance-amount" data-user-balance>$500.00</div>
        <button type="button" class="pb-btn-confirm pb-atm-confirm" data-action="consult">Generar comprobante</button>
      </div>
    </section>

    <section class="pb-atm-view" data-atm-view="payment" aria-labelledby="paymentTitle" hidden>
      <div class="pb-operation-header">
        <button type="button" class="pb-atm-control pb-atm-control-muted" data-go-view="menu">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Atrás
        </button>
        <h1 class="pb-screen-title" id="paymentTitle">Pago de servicios</h1>
      </div>

      <div class="pb-service-grid" role="group" aria-label="Servicios disponibles">
        <button type="button" class="pb-service-btn" data-service="Energía eléctrica">
          <i class="bi bi-lightning-charge" aria-hidden="true"></i>
          Energía
        </button>
        <button type="button" class="pb-service-btn" data-service="Internet">
          <i class="bi bi-wifi" aria-hidden="true"></i>
          Internet
        </button>
        <button type="button" class="pb-service-btn" data-service="Telefonía">
          <i class="bi bi-telephone" aria-hidden="true"></i>
          Telefonía
        </button>
        <button type="button" class="pb-service-btn" data-service="Agua potable">
          <i class="bi bi-droplet" aria-hidden="true"></i>
          Agua
        </button>
      </div>

      <input type="hidden" id="servicio" value="" data-error-target="serviceError">
      <div class="invalid-feedback pb-atm-error" id="serviceError"></div>

      <div class="pb-transaction-layout">
        <div class="pb-amount-panel">
          <label class="pb-amount-label" for="montoPago">Monto a pagar</label>
          <input class="pb-amount-display" id="montoPago" type="text" inputmode="none" readonly value="0.00" data-amount-input data-error-target="paymentError">
          <div class="invalid-feedback pb-atm-error" id="paymentError"></div>
          <button type="button" class="pb-btn-confirm pb-atm-confirm" data-action="payment">Confirmar pago</button>
        </div>

        <div class="pb-amount-keypad" data-keypad-for="montoPago" aria-label="Teclado numerico para pago"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
