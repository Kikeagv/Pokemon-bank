<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Historial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body data-page="history">
  <header class="pb-header">
    <img src="images/logo.png" alt="Pokémon Bank" class="pb-header-logo">
    <div class="pb-header-user">
      <div class="pb-header-user-name" data-user-name>Ash Ketchum</div>
      <div class="pb-header-user-account" data-user-account>0987654321</div>
    </div>
    <img src="images/trainer-avatar.png" alt="Foto de perfil de Ash Ketchum" class="pb-header-avatar">
    <a href="index.html" class="pb-btn-exit" data-logout>Salir</a>
  </header>

  <main class="container py-4">
    <h2 class="pb-title">Historial de Transacciones</h2>

    <div class="table-responsive">
      <table class="pb-history-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Descripción</th>
            <th>Monto</th>
            <th>Saldo</th>
          </tr>
        </thead>
        <tbody data-history-body>
          <tr>
            <td colspan="5" class="pb-empty-state">Cargando historial...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <a href="acciones.html" class="pb-btn-back">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
