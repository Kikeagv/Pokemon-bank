<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Gráfico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="pb-header">
    <img src="images/logo.png" alt="Pokémon Bank" class="pb-header-logo">
    <div class="pb-header-user">
      <div class="pb-header-user-name">Ash Ketchum</div>
      <div class="pb-header-user-account">151-0025-0001</div>
    </div>
    <img src="images/trainer-avatar.png" alt="Foto de perfil de Ash Ketchum" class="pb-header-avatar">
    <a href="index.html" class="pb-btn-exit">Salir</a>
  </header>

  <main class="container py-4">
    <h2 class="pb-title">Análisis de Transacciones</h2>

    <div class="pb-chart-container">
      <canvas id="chartTransacciones" width="600" height="400" role="img" aria-label="Gráfico de análisis de transacciones"></canvas>
      <!-- Chart.js se integra en la Fase 2 -->

      <div class="pb-chart-legend">
        <div class="pb-legend-item">
          <div class="pb-legend-color depositos"></div>
          <span>Depósitos 40%</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color retiros"></div>
          <span>Retiros 30%</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color pagos"></div>
          <span>Pagos 25%</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color consultas"></div>
          <span>Consultas 5%</span>
        </div>
      </div>
    </div>

    <a href="acciones.html" class="pb-btn-back">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
