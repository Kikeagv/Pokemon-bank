<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Gráfico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body data-page="chart">
  <header class="pb-header">
    <img src="images/logo.png" alt="Pokémon Bank" class="pb-header-logo">
    <div class="pb-header-user">
      <div class="pb-header-user-name" data-user-name>Ash Ketchum</div>
      <div class="pb-header-user-account" data-user-account>0987654321</div>
    </div>
    <img src="images/trainer-avatar.png" alt="Foto de perfil de Ash Ketchum" class="pb-header-avatar">
    <a href="index.html" class="pb-btn-exit" data-logout>Salir</a>
  </header>

  <main class="container py-4">
    <h2 class="pb-title">Análisis de Transacciones</h2>

    <div class="pb-chart-container">
      <div class="pb-chart-summary">
        <span>Total de transacciones</span>
        <strong data-chart-total>0</strong>
      </div>
      <p class="pb-empty-state" data-chart-empty>Aun no hay transacciones. Realice una operacion para alimentar el grafico.</p>
      <div class="pb-chart-canvas">
        <canvas id="chartTransacciones" role="img" aria-label="Gráfico de cantidad de transacciones por tipo"></canvas>
      </div>

      <div class="pb-chart-legend">
        <div class="pb-legend-item">
          <div class="pb-legend-color depositos"></div>
          <span>Depósitos</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color retiros"></div>
          <span>Retiros</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color pagos"></div>
          <span>Pagos</span>
        </div>
        <div class="pb-legend-item">
          <div class="pb-legend-color consultas"></div>
          <span>Consultas</span>
        </div>
      </div>
    </div>

    <a href="acciones.html" class="pb-btn-back">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
