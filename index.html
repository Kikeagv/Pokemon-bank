<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="pb-login-screen d-flex align-items-center justify-content-center min-vh-100" data-page="login">
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-7 col-lg-5">
        <div class="pb-atm-shell" aria-label="Cajero automatico Pokemon Bank">
          <img src="images/logo.png" alt="Pokémon Bank Logo" class="pb-logo">

          <h1 class="pb-title">Ingrese su PIN</h1>
          <p class="pb-atm-copy">Usuario de prueba: Ash Ketchum</p>

          <div class="pb-pin-inputs">
            <input type="password" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Dígito 1" data-pin-input>
            <input type="password" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Dígito 2" data-pin-input>
            <input type="password" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Dígito 3" data-pin-input>
            <input type="password" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Dígito 4" data-pin-input>
          </div>

          <div class="pb-keypad">
            <button class="pb-key" type="button" data-key="1">1</button>
            <button class="pb-key" type="button" data-key="2">2</button>
            <button class="pb-key" type="button" data-key="3">3</button>
            <button class="pb-key" type="button" data-key="4">4</button>
            <button class="pb-key" type="button" data-key="5">5</button>
            <button class="pb-key" type="button" data-key="6">6</button>
            <button class="pb-key" type="button" data-key="7">7</button>
            <button class="pb-key" type="button" data-key="8">8</button>
            <button class="pb-key" type="button" data-key="9">9</button>
            <button class="pb-key btn-clear" type="button" data-clear-pin>C</button>
            <button class="pb-key" type="button" data-key="0">0</button>
            <button class="pb-key btn-action" type="button" data-submit-pin>OK</button>
          </div>

          <button class="pb-link" type="button" data-forgot-pin>¿Olvidó su PIN?</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
