<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Bank - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="pb-card">
          <img src="images/logo.png" alt="Pokémon Bank Logo" class="pb-logo">

          <h1 class="pb-title">Ingrese su PIN</h1>

          <div class="pb-pin-inputs">
            <input type="password" maxlength="1" aria-label="Dígito 1">
            <input type="password" maxlength="1" aria-label="Dígito 2">
            <input type="password" maxlength="1" aria-label="Dígito 3">
            <input type="password" maxlength="1" aria-label="Dígito 4">
          </div>

          <div class="pb-keypad">
            <button class="pb-key" type="button">1</button>
            <button class="pb-key" type="button">2</button>
            <button class="pb-key" type="button">3</button>
            <button class="pb-key" type="button">4</button>
            <button class="pb-key" type="button">5</button>
            <button class="pb-key" type="button">6</button>
            <button class="pb-key" type="button">7</button>
            <button class="pb-key" type="button">8</button>
            <button class="pb-key" type="button">9</button>
            <button class="pb-key btn-clear" type="button">C</button>
            <button class="pb-key" type="button">0</button>
            <a href="acciones.html" class="pb-key btn-action" type="button">OK</a>
          </div>

          <a href="#" class="pb-link">¿Olvidó su PIN?</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
